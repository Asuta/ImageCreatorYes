<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qwen 生图控制台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <div class="panel-header">
          <h1>Qwen 生图控制台</h1>
          <p>调用 `qwen-image-2.0` / `qwen-image-2.0-pro` 生成图片。</p>
        </div>

        <form id="image-form" class="form">
          <label>
            模型
            <select name="model">
              <option value="qwen-image-2.0">qwen-image-2.0</option>
              <option value="qwen-image-2.0-pro">qwen-image-2.0-pro</option>
            </select>
          </label>

          <label class="full">
            提示词
            <textarea
              name="prompt"
              rows="4"
              placeholder="请输入你想生成的图片描述"
              required
            ></textarea>
          </label>

          <label class="full">
            反向提示词
            <input name="negativePrompt" type="text" placeholder="可选，例如：低清晰度、模糊" />
          </label>

          <label class="full">
            参考图（最多 3 张）
            <input
              name="referenceImages"
              id="reference-images"
              type="file"
              accept="image/*"
              multiple
            />
          </label>
          <div id="reference-dropzone" class="dropzone" tabindex="0">
            拖拽图片到这里，或点击上面的选择框添加参考图
          </div>
          <div id="reference-summary" class="hint">未选择参考图</div>
          <div id="reference-preview-list" class="reference-preview-list"></div>

          <label>
            图片尺寸
            <select name="size">
              <option value="1024*1024">1024 × 1024</option>
              <option value="1280*720">1280 × 720</option>
              <option value="720*1280">720 × 1280</option>
            </select>
          </label>

          <label>
            生成数量
            <input name="count" type="number" min="1" max="4" value="1" />
          </label>

          <label class="checkbox">
            <input name="promptExtend" type="checkbox" checked />
            开启提示词扩写
          </label>

          <label class="checkbox">
            <input name="watermark" type="checkbox" />
            添加水印
          </label>

          <button type="submit" id="submit-button">开始生成</button>
        </form>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>生成结果</h2>
          <p id="status-text">填写提示词后开始生成。</p>
        </div>
        <div id="results" class="results"></div>
      </section>
    </main>

    <template id="image-card-template">
      <article class="card">
        <img alt="生成结果" loading="lazy" />
        <a target="_blank" rel="noreferrer">打开原图</a>
        <label class="cutout-model-field">
          抠图模型
          <select class="cutout-model-select"></select>
        </label>
        <p class="cutout-model-hint"></p>
        <button type="button" class="cutout-button">抠成 PNG</button>
        <p class="cutout-status"></p>
        <div class="cutout-result"></div>
      </article>
    </template>

    <template id="reference-preview-template">
      <article class="reference-card" draggable="true">
        <img alt="参考图缩略图" loading="lazy" />
        <div class="reference-meta">
          <strong class="reference-name"></strong>
          <span class="reference-order"></span>
        </div>
        <div class="reference-actions">
          <button type="button" class="move-left">左移</button>
          <button type="button" class="move-right">右移</button>
          <button type="button" class="remove-reference danger">删除</button>
        </div>
      </article>
    </template>

    <script src="/referenceImages.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
